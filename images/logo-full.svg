<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="textAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(10, 10)">
    <!-- Background circle -->
    <circle cx="40" cy="40" r="38" fill="#1a1a2e"/>
    
    <!-- Remote body -->
    <rect x="28" y="14" width="24" height="52" rx="6" fill="url(#iconGrad)"/>
    
    <!-- Power button -->
    <circle cx="40" cy="22" r="4" fill="#1a1a2e"/>
    <circle cx="40" cy="22" r="2.5" fill="none" stroke="#22d3ee" stroke-width="1"/>
    
    <!-- D-pad -->
    <circle cx="40" cy="38" r="10" fill="#1a1a2e"/>
    <polygon points="40,31 37,35 43,35" fill="#22d3ee"/>
    <polygon points="40,45 37,41 43,41" fill="#22d3ee"/>
    <polygon points="33,38 37,35 37,41" fill="#22d3ee"/>
    <polygon points="47,38 43,35 43,41" fill="#22d3ee"/>
    <circle cx="40" cy="38" r="3.5" fill="#22d3ee"/>
    <circle cx="40" cy="38" r="2" fill="#1a1a2e"/>
    
    <!-- Bottom buttons -->
    <circle cx="33" cy="54" r="3" fill="#1a1a2e"/>
    <circle cx="40" cy="54" r="3" fill="#1a1a2e"/>
    <circle cx="47" cy="54" r="3" fill="#1a1a2e"/>
    
    <!-- Signal waves left -->
    <path d="M12 40 Q6 40 6 34 Q6 28 12 28" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M8 40 Q0 40 0 31 Q0 22 8 22" fill="none" stroke="#22d3ee" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Signal waves right -->
    <path d="M68 40 Q74 40 74 46 Q74 52 68 52" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M72 40 Q80 40 80 49 Q80 58 72 58" fill="none" stroke="#22d3ee" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  </g>
  
  <!-- Text: "Omni" -->
  <text x="105" y="62" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="700" fill="url(#textGradient)">Omni</text>
  
  <!-- Text: "Remote" -->
  <text x="215" y="62" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="300" fill="url(#textAccent)">Remote</text>
  
  <!-- Tagline -->
  <text x="105" y="82" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="400" fill="#888" letter-spacing="2">UNIVERSAL REMOTE CONTROL FOR HOME ASSISTANT</text>
</svg>
