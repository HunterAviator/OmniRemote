<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg-gradient)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(124,58,237,0.08)" stroke-width="1"/>
  </pattern>
  <rect width="1280" height="320" fill="url(#grid)"/>
  
  <!-- Logo icon (left side) -->
  <g transform="translate(180, 100)">
    <!-- Logo background -->
    <rect width="120" height="120" rx="24" fill="url(#logo-gradient)" filter="url(#glow)"/>
    
    <!-- Remote body -->
    <path d="M60 20c-16.6 0-30 13.4-30 30v40c0 16.6 13.4 30 30 30s30-13.4 30-30V50c0-16.6-13.4-30-30-30z" fill="none" stroke="#2DD4BF" stroke-width="4"/>
    
    <!-- Top button (power) -->
    <circle cx="60" cy="45" r="10" fill="#2DD4BF"/>
    
    <!-- Bottom button (ok) -->
    <circle cx="60" cy="95" r="10" fill="#2DD4BF"/>
    
    <!-- Middle button -->
    <circle cx="60" cy="70" r="6" fill="#2DD4BF"/>
  </g>
  
  <!-- Wordmark -->
  <g transform="translate(340, 135)">
    <text x="0" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="url(#text-gradient)">
      OmniRemote
    </text>
    <!-- Trademark symbol -->
    <text x="462" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#888">™</text>
    <!-- Underline -->
    <rect x="0" y="72" width="460" height="4" rx="2" fill="#2DD4BF"/>
  </g>
  
  <!-- Tagline -->
  <text x="340" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#9CA3AF">
    Universal Remote Control for Home Assistant
  </text>
  
  <!-- Pi Hub badge -->
  <g transform="translate(340, 265)">
    <rect width="140" height="30" rx="15" fill="rgba(16,185,129,0.2)" stroke="#10B981" stroke-width="1"/>
    <text x="70" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#10B981" text-anchor="middle">+ Pi Zero Hub</text>
  </g>
  
  <!-- IR badge -->
  <g transform="translate(500, 265)">
    <rect width="80" height="30" rx="15" fill="rgba(124,58,237,0.2)" stroke="#7C3AED" stroke-width="1"/>
    <text x="40" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7C3AED" text-anchor="middle">IR</text>
  </g>
  
  <!-- Bluetooth badge -->
  <g transform="translate(600, 265)">
    <rect width="100" height="30" rx="15" fill="rgba(37,99,235,0.2)" stroke="#2563EB" stroke-width="1"/>
    <text x="50" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2563EB" text-anchor="middle">Bluetooth</text>
  </g>
  
  <!-- USB badge -->
  <g transform="translate(720, 265)">
    <rect width="80" height="30" rx="15" fill="rgba(45,212,191,0.2)" stroke="#2DD4BF" stroke-width="1"/>
    <text x="40" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2DD4BF" text-anchor="middle">USB</text>
  </g>
  
  <!-- Copyright -->
  <text x="1100" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#666">
    © 2026 One Eye Enterprises LLC
  </text>
</svg>
