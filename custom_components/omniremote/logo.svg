<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  
  <!-- Logo background -->
  <rect width="200" height="200" rx="40" fill="url(#logo-gradient)"/>
  
  <!-- Remote body outline -->
  <path d="M100 30c-27.6 0-50 22.4-50 50v70c0 27.6 22.4 50 50 50s50-22.4 50-50V80c0-27.6-22.4-50-50-50z" fill="none" stroke="#2DD4BF" stroke-width="6"/>
  
  <!-- Top button (power) -->
  <circle cx="100" cy="70" r="16" fill="#2DD4BF"/>
  
  <!-- Bottom button (ok) -->
  <circle cx="100" cy="160" r="16" fill="#2DD4BF"/>
  
  <!-- Middle button -->
  <circle cx="100" cy="115" r="10" fill="#2DD4BF"/>
</svg>
